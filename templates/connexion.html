{% extends "base.html" %}
{% block title %}Connexion — Kaddu{% endblock %}
{% block content %}
<a href="{{ url_for('communaute') }}" class="back">&#8592; Communauté</a>
<div class="card pad-lg">
  <span class="pill pill-green">&#128272; Connexion</span>
  <h1 style="font-size:1.4rem;margin-top:14px">Se connecter</h1>
  <form method="post">
    <label class="fld" for="email">E-mail</label>
    <input type="email" id="email" name="email" value="{{ email }}" placeholder="vous@exemple.com" required>
    <label class="fld" for="password">Mot de passe</label>
    <input type="password" id="password" name="password" placeholder="Votre mot de passe" required>
    <div style="margin-top:20px"></div>
    <button type="submit" class="btn btn-primary">Se connecter</button>
  </form>
  <p class="center muted small" style="margin-top:14px">Pas encore de compte ?
    <a href="{{ url_for('inscription') }}">Créer un compte</a></p>
</div>
{% endblock %}
